<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Grid Bengaluru Control Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Source+Serif+4:wght@600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body data-theme="dark">
    <div class="control-shell">
      <aside class="sidebar glass-panel" id="sidebar">
        <div class="sidebar-brand">
          <div class="brand-mark">
            <i class="bi bi-lightning-charge-fill"></i>
          </div>
          <div>
            <p class="eyebrow mb-1">Bengaluru Smart Grid</p>
            <h1 class="brand-title mb-0">Control Center</h1>
          </div>
        </div>

        <nav class="sidebar-nav">
          <button class="nav-pill active" data-section="overview"><i class="bi bi-speedometer2"></i><span>Overview</span></button>
          <button class="nav-pill" data-section="live_monitoring"><i class="bi bi-broadcast"></i><span>Live Monitoring</span></button>
          <button class="nav-pill" data-section="theft_detection"><i class="bi bi-shield-exclamation"></i><span>Electricity Theft Detection</span></button>
          <button class="nav-pill" data-section="anomaly_detection"><i class="bi bi-activity"></i><span>Anomaly Detection</span></button>
          <button class="nav-pill" data-section="demand_forecast"><i class="bi bi-graph-up-arrow"></i><span>Demand Forecasting</span></button>
          <button class="nav-pill" data-section="energy_efficiency"><i class="bi bi-droplet-half"></i><span>Energy Efficiency Analytics</span></button>
          <button class="nav-pill" data-section="consumer_segmentation"><i class="bi bi-diagram-3"></i><span>Consumer Segmentation</span></button>
          <button class="nav-pill" data-section="grid_network"><i class="bi bi-bezier2"></i><span>Grid Network Visualization</span></button>
          <button class="nav-pill" data-section="heatmap"><i class="bi bi-geo-alt"></i><span>Bengaluru Heatmap</span></button>
          <button class="nav-pill" data-section="weather_impact"><i class="bi bi-cloud-sun"></i><span>Weather Impact Analytics</span></button>
          <button class="nav-pill" data-section="alerts"><i class="bi bi-bell"></i><span>Alert Center</span></button>
          <button class="nav-pill" data-section="reports"><i class="bi bi-file-earmark-bar-graph"></i><span>Reports & Insights</span></button>
        </nav>

        <div class="sidebar-footer">
          <div class="status-row">
            <span class="status-dot" id="apiStatusDot"></span>
            <div>
              <strong id="apiStatusText">API status pending</strong>
              <small id="apiStatusMeta">Checking backend connectivity</small>
            </div>
          </div>
          <a class="sidebar-link" href="./theft_heatmap.html" target="_blank" rel="noreferrer">
            <i class="bi bi-pin-map"></i>
            Open Folium Heatmap
          </a>
        </div>
      </aside>

      <main class="content-shell">
        <header class="topbar glass-panel">
          <div class="topbar-main">
            <button class="icon-button d-lg-none" id="sidebarToggle" type="button" aria-label="Toggle sidebar">
              <i class="bi bi-list"></i>
            </button>
            <div>
              <p class="eyebrow mb-1">Enterprise Smart Grid Analytics</p>
              <h2 class="topbar-title mb-1" id="sectionTitle">Overview</h2>
              <p class="topbar-subtitle mb-0" id="sectionSubtitle">
                System-wide KPIs, live demand, and smart-grid operational health.
              </p>
            </div>
          </div>

          <div class="topbar-actions">
            <div class="config-card">
              <label class="form-label" for="apiBase">API Base URL</label>
              <div class="input-group input-group-sm">
                <span class="input-group-text"><i class="bi bi-hdd-network"></i></span>
                <input class="form-control" id="apiBase" type="text" value="http://127.0.0.1:8000" />
              </div>
            </div>
            <button class="icon-button" id="refreshButton" type="button" aria-label="Refresh current section">
              <i class="bi bi-arrow-clockwise"></i>
            </button>
            <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle theme">
              <i class="bi bi-moon-stars-fill"></i>
              <span>Dark Mode</span>
            </button>
          </div>
        </header>

        <section class="frame-shell glass-panel">
          <iframe id="sectionFrame" title="Smart Grid Dashboard Section" src="./sections/overview.html"></iframe>
        </section>
      </main>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="./main.js"></script>
  </body>
</html>
