services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart-grid-api
    environment:
      SMARTGRID_UPDATE_INTERVAL: ${SMARTGRID_UPDATE_INTERVAL:-4}
      SMARTGRID_FULL_SCALE: ${SMARTGRID_FULL_SCALE:-0}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./database:/app/database
      - ./dataset:/app/dataset
      - ./maps:/app/maps
      - ./models:/app/models
      - ./reports:/app/reports
      - ./sample_outputs:/app/sample_outputs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped

  dashboard:
    image: nginx:1.27-alpine
    container_name: smart-grid-dashboard
    depends_on:
      - api
    ports:
      - "8080:80"
    volumes:
      - ./dashboard:/usr/share/nginx/html
      - ./maps/theft_heatmap.html:/usr/share/nginx/html/theft_heatmap.html:ro
      - ./reports:/usr/share/nginx/html/reports:ro
      - ./sample_outputs:/usr/share/nginx/html/sample_outputs:ro
    restart: unless-stopped
